; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATmega4808]
platform = atmelmegaavr
board = ATmega4808
framework = arduino
board_build.variant = 28pin-standard

; Clock frequency in [Hz]
board_build.f_cpu = 16000000L
; Oscillator type (internal or external)
board_hardware.oscillator = external

; Unflag build flags
build_unflags =
; Extra build flags
build_flags =
    -Wl,-u,vfprintf
    -lprintf_flt
    -lm
    ; Allow millis() in main.cpp to override the core's non-weak millis() in wiring.c
    -Wl,--allow-multiple-definition
;    -D DEBUG

; Monitor port is auto-detected. Override here
monitor_port = /dev/cu.usbserial*
monitor_speed = 115200
monitor_dtr = 0
monitor_echo = yes
monitor_filters = send_on_enter, time, colorize, log2file

upload_protocol = serialupdi
upload_port = /dev/cu.usbserial*
upload_speed = 230400
upload_flags =
    -xrtsdtr=high
    -v

; Hardware settings
board_hardware.bod = 2.7v
board_hardware.eesave = yes
board_hardware.uart = no_bootloader
; board_hardware.uart = uart2
board_hardware.rstpin = reset


lib_deps =
    jchristensen/JC_Button@^2.1.5
    mathertel/RotaryEncoder@^1.6.0
    duinowitchery/hd44780@^1.3.2
    etherkit/Etherkit Si5351@^2.2.0

lib_extra_dirs = lib
